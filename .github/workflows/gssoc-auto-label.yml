name: GSSoC — Auto-label PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  path-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Apply path-based labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

  title-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Apply type label from PR title prefix
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.pull_request.title || '';
            const num   = context.payload.pull_request.number;

            const map = {
              '^fix(\\(|:)':       'type:bug',
              '^feat(\\(|:)':      'type:feature',
              '^docs(\\(|:)':      'type:docs',
              '^test(\\(|:)':      'type:testing',
              '^perf(\\(|:)':      'type:performance',
              '^refactor(\\(|:)':  'type:refactor',
              '^style(\\(|:)':     'type:design',
              '^a11y(\\(|:)':      'type:accessibility',
              '^ci(\\(|:)':        'type:devops',
              '^build(\\(|:)':     'type:devops',
              '^chore(\\(|:)':     'type:devops',
              '^security(\\(|:)':  'type:security',
            };

            const toAdd = [];
            for (const [pattern, label] of Object.entries(map)) {
              if (new RegExp(pattern, 'i').test(title)) toAdd.push(label);
            }

            if (toAdd.length === 0) {
              core.info(`No type prefix matched in title: "${title}"`);
              return;
            }

            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: num,
              labels: toAdd,
            });
            core.info(`Added labels: ${toAdd.join(', ')}`);
