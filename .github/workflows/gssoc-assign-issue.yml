name: GSSoC — Auto-assign on claim

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign:
    if: github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Assign commenter if comment matches claim pattern
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body   = (context.payload.comment.body || '').toLowerCase();
            const user   = context.payload.comment.user.login;
            const number = context.payload.issue.number;
            const issue  = context.payload.issue;

            // Claim phrases — accept several variants
            const CLAIM_RE = /(work on this|claim this|assign me|i would like to work|please assign|i'd like to work|let me work on this)/i;
            if (!CLAIM_RE.test(body)) {
              core.info('Comment does not match claim pattern; ignoring.');
              return;
            }

            // Skip bots
            if (user.endsWith('[bot]')) return;

            // Already assigned?
            const currentAssignees = (issue.assignees || []).map(a => a.login);
            if (currentAssignees.length > 0) {
              if (currentAssignees.includes(user)) {
                core.info(`@${user} already assigned; no-op.`);
                return;
              }
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body: `Hey @${user}, this issue is already assigned to @${currentAssignees[0]}. If they don't open a PR within 7 days the issue will be freed up automatically.`,
              });
              return;
            }

            // Assign + label + comment
            await github.rest.issues.addAssignees({
              ...context.repo,
              issue_number: number,
              assignees: [user],
            });
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: number,
              labels: ['assigned'],
            });

            const due = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: number,
              body: [
                `✅ Assigned to @${user}!`,
                ``,
                `Please open a PR by **${due}** (7 days from now). After that, the issue is automatically freed for another contributor.`,
                ``,
                `**Reminders:**`,
                `- ⭐ Star the repo before opening the PR (the \`star-check\` job blocks merge otherwise)`,
                `- PR title: \`type: short description\``,
                `- Link this issue in the PR body: \`Closes #${number}\``,
                ``,
                `Good luck! 🚀`,
              ].join('\n'),
            });
