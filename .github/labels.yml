# Canonical label list for TermUI — GSSoC 2026
# Synced to the repo by .github/workflows/gssoc-labels-sync.yml on push.
# Edit this file to add/remove/rename labels; the workflow will reconcile.

# ── GSSoC point-system labels (mandatory) ──────────────────────────────
- name: "gssoc:approved"
  color: "0e8a16"
  description: "Approved PR — earns +50 base points"
- name: "gssoc:invalid"
  color: "d93f0b"
  description: "PR violates GSSoC rules — 0 points"
- name: "gssoc:spam"
  color: "b60205"
  description: "Spam contribution — 0 points + disqualification risk"
- name: "gssoc:ai-slop"
  color: "b60205"
  description: "Low-effort AI-generated content — 0 points"

# ── Difficulty (admin picks one) ───────────────────────────────────────
- name: "level:beginner"
  color: "c2e0c6"
  description: "+20 pts (entry-level task)"
- name: "level:intermediate"
  color: "fbca04"
  description: "+35 pts (moderate task)"
- name: "level:advanced"
  color: "ee9322"
  description: "+55 pts (complex task)"
- name: "level:critical"
  color: "b60205"
  description: "+80 pts (high-impact task)"

# ── Quality multiplier (admin sets after review) ───────────────────────
- name: "quality:clean"
  color: "0e8a16"
  description: "× 1.2 multiplier (clean implementation)"
- name: "quality:exceptional"
  color: "5319e7"
  description: "× 1.5 multiplier (exceptional work)"

# ── Type bonus (stackable, mostly auto-applied) ────────────────────────
- name: "type:docs"
  color: "0075ca"
  description: "+5 pts (documentation)"
- name: "type:bug"
  color: "d73a4a"
  description: "+10 pts (bug fix)"
- name: "type:feature"
  color: "a2eeef"
  description: "+10 pts (new feature)"
- name: "type:testing"
  color: "bfd4f2"
  description: "+10 pts (tests)"
- name: "type:design"
  color: "d4c5f9"
  description: "+10 pts (visual/UX)"
- name: "type:refactor"
  color: "fef2c0"
  description: "+10 pts (refactor)"
- name: "type:accessibility"
  color: "1d76db"
  description: "+15 pts (a11y)"
- name: "type:performance"
  color: "fbca04"
  description: "+15 pts (perf)"
- name: "type:devops"
  color: "0e8a16"
  description: "+15 pts (CI/build/release)"
- name: "type:security"
  color: "b60205"
  description: "+20 pts (security fix)"

